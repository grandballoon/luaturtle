<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lua Turtle — Learn to Code with Turtle Graphics</title>
<meta name="description" content="Write Lua code and watch a turtle draw. A free, browser-based tool for learning programming through turtle graphics.">

<!-- Favicon: inline SVG turtle arrow -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><polygon points='24,16 10,24 10,8' fill='%234ec9b0'/></svg>">

<!-- CodeMirror -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/tomorrow-night-eighties.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/lua/lua.min.js"></script>

<!-- Wasmoon -->
<script src="wasmoon.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1a1a1a;
    --surface: #232323;
    --border: #333;
    --text: #d4d4d4;
    --text-muted: #808080;
    --accent: #4ec9b0;
    --accent-dim: #2a7a68;
    --error: #f44747;
    --canvas-bg: #121212;
  }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  #app {
    display: grid;
    grid-template-rows: auto 1fr;
    height: 100vh;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  header h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.5px;
  }

  .header-controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  button {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s ease;
  }

  button:hover {
    border-color: var(--accent-dim);
    color: var(--accent);
  }

  button.primary {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: #fff;
  }

  button.primary:hover {
    background: var(--accent);
    color: var(--bg);
  }

  #main {
    display: grid;
    grid-template-columns: 1fr 6px 1fr;
    overflow: hidden;
  }

  #editor-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 100px;
  }

  #splitter {
    background: var(--border);
    cursor: col-resize;
    position: relative;
    z-index: 10;
    transition: background 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #splitter:hover,
  #splitter.dragging {
    background: var(--accent-dim);
  }

  #splitter-grip {
    display: flex;
    flex-direction: column;
    gap: 3px;
    opacity: 0.4;
    transition: opacity 0.15s ease;
  }

  #splitter:hover #splitter-grip,
  #splitter.dragging #splitter-grip {
    opacity: 1;
  }

  #splitter-grip span {
    display: block;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--text-muted);
  }

  #splitter:hover #splitter-grip span,
  #splitter.dragging #splitter-grip span {
    background: var(--accent);
  }

  .CodeMirror {
    flex: 1;
    font-family: 'IBM Plex Mono', monospace !important;
    font-size: 14px;
    line-height: 1.6;
    height: auto !important;
  }

  #status-bar {
    padding: 6px 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    background: var(--surface);
    border-top: 1px solid var(--border);
    min-height: 28px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }

  #status-bar.error {
    color: var(--error);
  }

  #canvas-panel {
    position: relative;
    background: var(--canvas-bg);
    overflow: hidden;
    min-width: 100px;
  }

  #canvas-toolbar {
    position: absolute;
    top: 8px;
    right: 8px;
    display: flex;
    gap: 4px;
    z-index: 5;
    opacity: 0.08;
    transition: opacity 0.2s ease;
  }

  #canvas-toolbar:hover {
    opacity: 1;
  }

  #canvas-toolbar button {
    padding: 4px 8px;
    font-size: 11px;
    background: rgba(35, 35, 35, 0.85);
    border-color: rgba(51, 51, 51, 0.8);
    min-width: 28px;
  }

  #zoom-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    padding: 4px 6px;
    line-height: 1.6;
    user-select: none;
  }

  #turtle-canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* Mobile: stacked vertically */
  @media (max-width: 768px) {
    #main {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr 6px 1fr;
    }

    #splitter {
      cursor: row-resize;
    }

    #splitter-grip {
      flex-direction: row;
    }

    #editor-panel {
      border-bottom: none;
      min-width: unset;
      min-height: 80px;
    }

    #canvas-panel {
      min-width: unset;
      min-height: 80px;
    }

    .CodeMirror {
      font-size: 13px;
    }

    button {
      padding: 8px 16px;
    }
  }
</style>
</head>
<body>

<div id="app">
  <header>
    <h1>LUA TURTLE</h1>
    <div class="header-controls">
      <button id="btn-stop">Stop</button>
      <button id="btn-run" class="primary">Run &#9654;</button>
    </div>
  </header>

  <div id="main">
    <div id="editor-panel">
      <textarea id="editor-textarea"></textarea>
      <div id="status-bar">Loading...</div>
    </div>
    <div id="splitter" title="Drag to resize">
      <div id="splitter-grip">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
    <div id="canvas-panel">
      <div id="canvas-toolbar">
        <button id="btn-zoom-in" title="Zoom in">+</button>
        <button id="btn-zoom-out" title="Zoom out">&minus;</button>
        <button id="btn-zoom-reset" title="Reset view">Reset</button>
        <span id="zoom-label">100%</span>
      </div>
      <canvas id="turtle-canvas"></canvas>
    </div>
  </div>
</div>

<script>
(async function main() {

  // ---- CodeMirror setup ----

  const textarea = document.getElementById('editor-textarea');
  textarea.value = [
    '-- Welcome to Lua Turtle!',
    '-- Write code on the left, click Run to see it draw.',
    '-- Keyboard shortcut: Ctrl+Enter (or Cmd+Enter on Mac)',
    '',
    '-- Try completing the square:',
    '',
    'forward(100)',
    'right(90)',
    'forward(100)',
    '',
    '-- More commands:',
    '-- back(n)  left(n)  penup()  pendown()',
    '-- pencolor(r, g, b)  pensize(n)  speed(n)',
    '-- bgcolor(r, g, b)  clear()  reset()',
    '-- use fd(100), bk(100), rt(90), and lt(90) when you get tired of typing.'
  ].join('\n');

  const editor = CodeMirror.fromTextArea(textarea, {
    mode: 'lua',
    theme: 'tomorrow-night-eighties',
    lineNumbers: true,
    indentUnit: 4,
    tabSize: 4,
    indentWithTabs: false,
    lineWrapping: false,
  });

  const statusBar = document.getElementById('status-bar');

  function setStatus(msg, isError) {
    statusBar.textContent = msg;
    statusBar.className = isError ? 'error' : '';
  }

  // ---- Canvas setup ----

  const canvas = document.getElementById('turtle-canvas');
  const ctx = canvas.getContext('2d');

  let commitCanvas = null;
  let commitCtx = null;

  // ---- Viewport state (zoom + pan) ----
  // viewScale: 1 = 1:1 turtle pixel to screen pixel
  // viewCenterX/Y: turtle-space coordinate at the center of the canvas
  let viewScale = 1;
  let viewCenterX = 0;
  let viewCenterY = 0;

  const ZOOM_MIN = 0.05;
  const ZOOM_MAX = 20;
  const ZOOM_STEP = 1.15;  // multiplier per click/scroll notch

  function updateZoomLabel() {
    document.getElementById('zoom-label').textContent =
      Math.round(viewScale * 100) + '%';
  }

  function resetView() {
    viewScale = 1;
    viewCenterX = 0;
    viewCenterY = 0;
    updateZoomLabel();
    needsFullRedraw = true;
  }

  // Zoom toward a point in screen-space (sx, sy).
  // This keeps the turtle-space point under the cursor stationary.
  function zoomAt(factor, sx, sy) {
    const cssW = canvas.width / (window.devicePixelRatio || 1);
    const cssH = canvas.height / (window.devicePixelRatio || 1);

    // Convert screen point to turtle-space before zoom
    const txBefore = (sx - cssW / 2) / viewScale + viewCenterX;
    const tyBefore = -(sy - cssH / 2) / viewScale + viewCenterY;

    viewScale = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, viewScale * factor));

    // After zoom, what screen point does that turtle-space point map to?
    // We want it to still be at (sx, sy), so adjust viewCenter.
    viewCenterX = txBefore - (sx - cssW / 2) / viewScale;
    viewCenterY = tyBefore + (sy - cssH / 2) / viewScale;

    updateZoomLabel();
    needsFullRedraw = true;
  }

  // Zoom toward canvas center (for button clicks)
  function zoomCenter(factor) {
    const cssW = canvas.width / (window.devicePixelRatio || 1);
    const cssH = canvas.height / (window.devicePixelRatio || 1);
    zoomAt(factor, cssW / 2, cssH / 2);
  }

  function resizeCanvas() {
    const panel = document.getElementById('canvas-panel');
    const w = panel.clientWidth;
    const h = panel.clientHeight;
    if (w === 0 || h === 0) return;  // collapsed panel
    const dpr = window.devicePixelRatio || 1;

    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    commitCanvas = document.createElement('canvas');
    commitCanvas.width = w * dpr;
    commitCanvas.height = h * dpr;
    commitCtx = commitCanvas.getContext('2d');
    commitCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

    needsFullRedraw = true;
  }

  let needsFullRedraw = true;

  // Track whether the splitter is being dragged so we can suppress
  // canvas resize during the drag (avoids black flash).
  let splitterDragging = false;

  // ResizeObserver: fires on any panel size change (window resize,
  // splitter drag, orientation change, devtools open, etc.)
  const canvasPanel = document.getElementById('canvas-panel');
  new ResizeObserver(() => {
    if (!splitterDragging) resizeCanvas();
  }).observe(canvasPanel);
  resizeCanvas();

  // ---- Coordinate transforms (viewport-aware) ----

  function screenX(tx) {
    const cssW = canvas.width / (window.devicePixelRatio || 1);
    return cssW / 2 + (tx - viewCenterX) * viewScale;
  }

  function screenY(ty) {
    const cssH = canvas.height / (window.devicePixelRatio || 1);
    return cssH / 2 - (ty - viewCenterY) * viewScale;
  }

  // ---- Zoom controls (toolbar buttons only) ----

  document.getElementById('btn-zoom-in').addEventListener('click', () => zoomCenter(ZOOM_STEP));
  document.getElementById('btn-zoom-out').addEventListener('click', () => zoomCenter(1 / ZOOM_STEP));
  document.getElementById('btn-zoom-reset').addEventListener('click', resetView);

  // ---- Splitter (resizable panels) ----

  {
    const mainEl = document.getElementById('main');
    const splitter = document.getElementById('splitter');

    splitter.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      splitterDragging = true;
      splitter.classList.add('dragging');
      splitter.setPointerCapture(e.pointerId);
    });

    splitter.addEventListener('pointermove', (e) => {
      if (!splitterDragging) return;
      const rect = mainEl.getBoundingClientRect();
      const isMobile = window.matchMedia('(max-width: 768px)').matches;

      if (isMobile) {
        const y = e.clientY - rect.top;
        const total = rect.height;
        const pct = Math.max(10, Math.min(90, (y / total) * 100));
        mainEl.style.gridTemplateRows = `${pct}% 6px 1fr`;
      } else {
        const x = e.clientX - rect.left;
        const total = rect.width;
        const pct = Math.max(10, Math.min(90, (x / total) * 100));
        mainEl.style.gridTemplateColumns = `${pct}% 6px 1fr`;
      }
      // CodeMirror needs to know its container changed size
      editor.refresh();
    });

    const stopDrag = () => {
      if (splitterDragging) {
        splitterDragging = false;
        splitter.classList.remove('dragging');
        // Now that the drag is done, resize the canvas properly
        resizeCanvas();
      }
    };
    splitter.addEventListener('pointerup', stopDrag);
    splitter.addEventListener('pointercancel', stopDrag);

    // Double-click to reset to 50/50
    splitter.addEventListener('dblclick', () => {
      mainEl.style.gridTemplateColumns = '';
      mainEl.style.gridTemplateRows = '';
      editor.refresh();
    });
  }

  // ---- Renderer ----

  function colorToCSS(r, g, b, a) {
    return 'rgba(' +
      Math.round(r * 255) + ',' +
      Math.round(g * 255) + ',' +
      Math.round(b * 255) + ',' +
      a + ')';
  }

  let renderedSegmentCount = 0;
  let renderedFillCount = 0;

  function drawSegmentOnCommit(fromX, fromY, toX, toY, r, g, b, a, width) {
    commitCtx.beginPath();
    commitCtx.moveTo(screenX(fromX), screenY(fromY));
    commitCtx.lineTo(screenX(toX), screenY(toY));
    commitCtx.strokeStyle = colorToCSS(r, g, b, a);
    commitCtx.lineWidth = width * viewScale;
    commitCtx.lineCap = 'round';
    commitCtx.stroke();
  }

  function drawFill(vertices, color) {
    // vertices is a named-table array from Lua — arrives as a JS object
    // with numeric string keys. color is a 0-indexed JS array.
    const r = color[0], g = color[1], b = color[2], a = color[3];
    const len = Object.keys(vertices).length;
    if (len < 3) return;
    commitCtx.save();
    commitCtx.fillStyle = colorToCSS(r, g, b, a);
    commitCtx.beginPath();
    commitCtx.moveTo(screenX(vertices[0].x), screenY(vertices[0].y));
    for (let i = 1; i < len; i++) {
      commitCtx.lineTo(screenX(vertices[i].x), screenY(vertices[i].y));
    }
    commitCtx.closePath();
    commitCtx.fill();
    commitCtx.restore();
  }

  function fullRedrawCommitted() {
    const w = commitCanvas.width / (window.devicePixelRatio || 1);
    const h = commitCanvas.height / (window.devicePixelRatio || 1);
    commitCtx.clearRect(0, 0, w, h);
    renderedSegmentCount = 0;
    renderedFillCount = 0;

    // Redraw fills first (they render behind segments)
    const fillCount = coreGetFillCount();
    for (let i = 1; i <= fillCount; i++) {
      const fill = coreGetFill(i);
      if (fill != null) {
        drawFill(fill.vertices, fill.color);
      }
    }
    renderedFillCount = fillCount;

    const count = coreGetSegmentCount();
    for (let i = 1; i <= count; i++) {
      const seg = coreGetSegment(i);
      if (seg != null) {
        drawSegmentOnCommit(seg[0], seg[1], seg[2], seg[3],
                            seg[4], seg[5], seg[6], seg[7], seg[8]);
      }
    }
    renderedSegmentCount = count;
  }

  function renderIncrementalSegments() {
    const count = coreGetSegmentCount();
    for (let i = renderedSegmentCount + 1; i <= count; i++) {
      const seg = coreGetSegment(i);
      if (seg != null) {
        drawSegmentOnCommit(seg[0], seg[1], seg[2], seg[3],
                            seg[4], seg[5], seg[6], seg[7], seg[8]);
      }
    }
    renderedSegmentCount = count;
  }

  function renderIncrementalFills() {
    const count = coreGetFillCount();
    for (let i = renderedFillCount + 1; i <= count; i++) {
      const fill = coreGetFill(i);
      if (fill != null) {
        drawFill(fill.vertices, fill.color);
      }
    }
    renderedFillCount = count;
  }

  function renderFrame(state, bgColor, previewLine) {
    const w = canvas.width / (window.devicePixelRatio || 1);
    const h = canvas.height / (window.devicePixelRatio || 1);

    // Background
    ctx.fillStyle = colorToCSS(bgColor[0], bgColor[1], bgColor[2], bgColor[3]);
    ctx.fillRect(0, 0, w, h);

    // Committed segments and fills
    if (commitCanvas) {
      ctx.drawImage(commitCanvas, 0, 0, w, h);
    }

    // Preview line (in-progress move)
    if (previewLine) {
      ctx.beginPath();
      ctx.moveTo(screenX(previewLine[0]), screenY(previewLine[1]));
      ctx.lineTo(screenX(previewLine[2]), screenY(previewLine[3]));
      ctx.strokeStyle = colorToCSS(previewLine[4], previewLine[5],
                                   previewLine[6], previewLine[7]);
      ctx.lineWidth = previewLine[8] * viewScale;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    // Turtle head
    const sx = screenX(state.x);
    const sy = screenY(state.y);
    const screenAngle = -state.angle * Math.PI / 180;

    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(screenAngle);
    const s = 10 * viewScale;
    ctx.beginPath();
    ctx.moveTo(s, 0);
    ctx.lineTo(-s * 0.6, s * 0.6);
    ctx.lineTo(-s * 0.6, -s * 0.6);
    ctx.closePath();
    ctx.fillStyle = colorToCSS(0.2, 0.9, 0.4, 1);
    ctx.fill();
    ctx.restore();
  }

  // ---- Wasmoon / Lua setup ----

  setStatus('Loading Lua VM...');

  let lua = null;
  let coreUpdate = null;
  let coreGetTurtleState = null;
  let coreGetBgColor = null;
  let coreGetSegmentCount = null;
  let coreGetSegment = null;
  let coreGetFillCount = null;
  let coreGetFill = null;
  let coreGetPreviewLine = null;
  let coreIsBusy = null;
  let coreInterrupt = null;

  try {
    const factory = new wasmoon.LuaFactory('glue.wasm');
    lua = await factory.createEngine();

    const coreLuaSource = await fetch('core.lua').then(r => r.text()).catch(() => null);

    if (coreLuaSource) {
      await factory.mountFile('core.lua', coreLuaSource);
    } else {
      setStatus('Error: core.lua not found. Serve it alongside index.html.', true);
      return;
    }

    await lua.doString(`
      Core = require("core")
      turtle = Core.new(nil)

      _bridge_update          = function(dt) return turtle.update(dt) end
      _bridge_turtle_state    = function() return turtle.get_turtle_state() end
      _bridge_bg_color        = function() return turtle.get_bg_color() end
      _bridge_segment_count   = function() return turtle.get_segment_count() end
      _bridge_segment         = function(i) return turtle.get_segment(i) end
      _bridge_fill_count      = function() return turtle.get_fill_count() end
      _bridge_fill            = function(i) return turtle.get_fill(i) end
      _bridge_preview_line    = function() return turtle.get_preview_line() end
      _bridge_is_busy         = function() return turtle.is_busy() end
      _bridge_interrupt       = function() return turtle.interrupt() end
    `);

    coreUpdate          = lua.global.get('_bridge_update');
    coreGetTurtleState  = lua.global.get('_bridge_turtle_state');
    coreGetBgColor      = lua.global.get('_bridge_bg_color');
    coreGetSegmentCount = lua.global.get('_bridge_segment_count');
    coreGetSegment      = lua.global.get('_bridge_segment');
    coreGetFillCount    = lua.global.get('_bridge_fill_count');
    coreGetFill         = lua.global.get('_bridge_fill');
    coreGetPreviewLine  = lua.global.get('_bridge_preview_line');
    coreIsBusy          = lua.global.get('_bridge_is_busy');
    coreInterrupt       = lua.global.get('_bridge_interrupt');

    setStatus('Ready \u2014 click Run or press Ctrl+Enter');

  } catch (err) {
    setStatus('Failed to load: ' + err.message, true);
    console.error(err);
    return;
  }

  // ---- Run user code ----

  async function runUserCode() {
    const code = editor.getValue();

    coreInterrupt();

    await lua.doString(`
      turtle.x = 0
      turtle.y = 0
      turtle.angle = 0
      turtle.pen_down = true
      turtle.pen_color = {1, 1, 1, 1}
      turtle.pen_size = 2
      turtle.bg_color = {0.07, 0.07, 0.07, 1}
      turtle.speed_setting = 5
      turtle.actions = {}
      turtle.current = nil
      turtle.segments = {}
      turtle.fills = {}
      turtle.fill_active = false
      turtle.fill_vertices = {}
      turtle.fill_color = nil
    `);

    renderedSegmentCount = 0;
    renderedFillCount = 0;
    const w = commitCanvas.width / (window.devicePixelRatio || 1);
    const h = commitCanvas.height / (window.devicePixelRatio || 1);
    commitCtx.clearRect(0, 0, w, h);

    try {
      await lua.doString(`
        local env = {
          math = math,
          ipairs = ipairs,
          pairs = pairs,
          tostring = tostring,
          tonumber = tonumber,
          print = print,
          type = type,
          string = string,
          table = table,

          forward = function(...) return turtle.forward(...) end,
          back    = function(...) return turtle.back(...)    end,
          left    = function(...) return turtle.left(...)    end,
          right   = function(...) return turtle.right(...)   end,
          fd = function(...) return turtle.forward(...) end,
          bk = function(...) return turtle.back(...)    end,
          lt = function(...) return turtle.left(...)    end,
          rt = function(...) return turtle.right(...)   end,

          penup    = function(...) return turtle.penup(...)    end,
          pendown  = function(...) return turtle.pendown(...)  end,
          pu       = function(...) return turtle.penup(...)    end,
          pd       = function(...) return turtle.pendown(...)  end,
          pensize  = function(...) return turtle.pensize(...)  end,
          pencolor = function(...) return turtle.pencolor(...) end,
          bgcolor  = function(...) return turtle.bgcolor(...)  end,
          clear    = function(...) return turtle.clear(...)    end,
          reset    = function(...) return turtle.reset(...)    end,
          speed    = function(...) return turtle.speed(...)    end,

          position = function(...) return turtle.position(...) end,
          heading  = function(...) return turtle.heading(...)  end,
          isdown   = function(...) return turtle.isdown(...)   end,

          setheading   = function(...) return turtle.setheading(...)   end,
          seth         = function(...) return turtle.setheading(...)   end,
          home         = function(...) return turtle.home(...)         end,
          setpos       = function(...) return turtle.setpos(...)       end,
          arc          = function(...) return turtle.arc(...)          end,
          circle       = function(...) return turtle.circle(...)       end,

          setfillcolor = function(...) return turtle.setfillcolor(...) end,
          begin_fill   = function(...) return turtle.begin_fill(...)   end,
          end_fill     = function(...) return turtle.end_fill(...)     end,
        }

        local chunk, err = load(user_code, "user_code", "t", env)
        if not chunk then
          error("Syntax error: " .. tostring(err))
        end
        chunk()
      `);

      setStatus('Running');
    } catch (err) {
      const msg = err.message || String(err);
      const cleaned = msg.replace(/^.*Lua Error\([^)]*\):\s*/, '');
      setStatus(cleaned, true);
      console.error('User code error:', err);
    }
  }

  // ---- Game loop ----

  let lastTime = null;

  function gameLoop(timestamp) {
    requestAnimationFrame(gameLoop);

    if (lastTime === null) { lastTime = timestamp; return; }
    let dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    if (dt > 0.1) dt = 0.1;

    try {
      coreUpdate(dt);
    } catch (err) {
      console.error('Update error:', err);
    }

    try {
      if (needsFullRedraw) {
        fullRedrawCommitted();
        needsFullRedraw = false;
      } else {
        renderIncrementalFills();
        renderIncrementalSegments();
      }

      const state = coreGetTurtleState();
      const bgColor = coreGetBgColor();

      let previewLine = null;
      const pv = coreGetPreviewLine();
      if (pv != null && pv[0] != null) {
        previewLine = pv;
      }

      renderFrame(state, bgColor, previewLine);

      const busy = coreIsBusy();
      if (busy === 0 && statusBar.textContent === 'Running') {
        setStatus('Done');
      }
    } catch (err) {
      console.error('Render error:', err);
    }
  }

  // ---- Wire up controls ----

  document.getElementById('btn-run').addEventListener('click', async () => {
    const code = editor.getValue();
    lua.global.set('user_code', code);
    await runUserCode();
  });

  document.getElementById('btn-stop').addEventListener('click', () => {
    coreInterrupt();
    setStatus('Stopped');
  });

  editor.setOption('extraKeys', {
    'Ctrl-Enter': () => document.getElementById('btn-run').click(),
    'Cmd-Enter': () => document.getElementById('btn-run').click(),
  });

  // ---- Start ----

  requestAnimationFrame(gameLoop);

})();
</script>

</body>
